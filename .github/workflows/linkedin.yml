name: Daily LinkedIn Poster

on:
  schedule:
    # 7:15 PM IST is 1:45 PM UTC (13:45)
    - cron: '45 13 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit database changes back to the repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run poster script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_ID: ${{ secrets.LINKEDIN_ORG_ID }}
        run: python linkedin_poster.py

      - name: Commit & push history database changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_articles_linkedin.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update posted articles linkedin database [skip ci]" && git push)
